<svg width="800" height="720" viewBox="0 0 800 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="720" fill="#ffffff" rx="8"/>

  <!-- ══ Terraform header banner ══ -->
  <rect x="0" y="0" width="800" height="36" rx="8" fill="#7B42BC"/>
  <rect x="0" y="28" width="800" height="8" fill="#7B42BC"/>
  <!-- Terraform T-logo (simplified) -->
  <rect x="16" y="6" width="18" height="3" rx="1" fill="white"/>
  <rect x="23" y="6" width="3" height="20" rx="1" fill="white"/>
  <text x="44" y="22" font-size="13" font-weight="700" fill="white">Terraform</text>
  <text x="120" y="22" font-size="12" fill="#e0c8ff">·  Infrastructure as Code</text>
  <!-- right side badges -->
  <rect x="540" y="8" width="100" height="20" rx="4" fill="#5c2d91"/>
  <text x="590" y="22" text-anchor="middle" font-size="10" fill="#e0c8ff">provider: aws</text>
  <rect x="650" y="8" width="136" height="20" rx="4" fill="#5c2d91"/>
  <text x="718" y="22" text-anchor="middle" font-size="10" fill="#e0c8ff">region: ca-central-1</text>

  <!-- ══ Users ══ -->
  <circle cx="400" cy="68" r="14" fill="none" stroke="#1a73e8" stroke-width="2"/>
  <path d="M375 104 Q375 88 400 88 Q425 88 425 104" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <line x1="375" y1="104" x2="425" y2="104" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <text x="400" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Users</text>

  <!-- Arrow: Users → IGW -->
  <line x1="400" y1="123" x2="400" y2="158" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══ AWS Cloud boundary ══ -->
  <rect x="20" y="136" width="760" height="568" rx="10" fill="none" stroke="#FF9900" stroke-width="2" stroke-dasharray="8 4"/>
  <rect x="20" y="136" width="80" height="24" rx="4" fill="#232F3E"/>
  <text x="60" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#FF9900" font-family="monospace">aws</text>
  <text x="112" y="152" font-size="12" font-weight="600" fill="#e07b00">AWS Cloud</text>

  <!-- Terraform resource label on AWS Cloud -->
  <rect x="620" y="140" width="150" height="18" rx="4" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.8"/>
  <text x="695" y="152" text-anchor="middle" font-size="9" fill="#5c2d91">aws_vpc.myapp-vpc</text>

  <!-- ══ VPC boundary ══ -->
  <rect x="40" y="168" width="720" height="524" rx="8" fill="#f0faf0" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="52" y="180" width="18" height="14" rx="3" fill="#2e7d32" opacity="0.8"/>
  <text x="78" y="191" font-size="12" font-weight="600" fill="#1b5e20">VPC — dev-vpc (10.0.0.0/16)</text>

  <!-- ══ Internet Gateway ══ -->
  <rect x="336" y="162" width="128" height="56" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <line x1="364" y1="200" x2="364" y2="178" stroke="#1a73e8" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="384" y1="178" x2="384" y2="200" stroke="#1a73e8" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="420" y="186" font-size="11" font-weight="600" fill="#0d47a1">Internet</text>
  <text x="420" y="202" font-size="11" font-weight="600" fill="#0d47a1">Gateway</text>
  <text x="400" y="228" text-anchor="middle" font-size="10" fill="#555">dev-igw</text>
  <!-- Terraform label -->
  <rect x="310" y="218" width="180" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.7"/>
  <text x="400" y="229" text-anchor="middle" font-size="9" fill="#5c2d91">aws_internet_gateway.myapp-igw</text>

  <!-- Arrow: IGW → Route Table -->
  <line x1="400" y1="234" x2="400" y2="262" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Subnet boundary ══ -->
  <rect x="60" y="258" width="680" height="420" rx="8" fill="#e8f0fe" fill-opacity="0.4" stroke="#1a73e8" stroke-width="1.2" stroke-dasharray="6 3"/>
  <rect x="76" y="268" width="14" height="12" rx="2" fill="none" stroke="#1a73e8" stroke-width="1.2"/>
  <path d="M79 268 Q79 263 83 263 Q87 263 87 268" fill="none" stroke="#1a73e8" stroke-width="1.2"/>
  <text x="98" y="277" font-size="11" font-weight="600" fill="#0d47a1">Public Subnet — 10.0.10.0/24 · ca-central-1a</text>
  <!-- Terraform label -->
  <rect x="490" y="262" width="238" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.7"/>
  <text x="609" y="273" text-anchor="middle" font-size="9" fill="#5c2d91">aws_subnet.myapp-subnet-1</text>

  <!-- ══ Route Table ══ -->
  <rect x="290" y="288" width="220" height="48" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.2"/>
  <line x1="308" y1="304" x2="330" y2="304" stroke="#e65100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="308" y1="312" x2="330" y2="312" stroke="#e65100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="308" y1="320" x2="330" y2="320" stroke="#e65100" stroke-width="1.5" stroke-linecap="round"/>
  <text x="400" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">Route table — dev-main-rtb</text>
  <text x="400" y="324" text-anchor="middle" font-size="11" fill="#e65100">0.0.0.0/0 → Internet Gateway</text>
  <!-- Terraform label -->
  <rect x="268" y="336" width="264" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.7"/>
  <text x="400" y="347" text-anchor="middle" font-size="9" fill="#5c2d91">aws_default_route_table.main-rtb</text>

  <!-- Arrow: Route Table → Security Group -->
  <line x1="400" y1="352" x2="400" y2="378" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Security Group boundary ══ -->
  <rect x="80" y="378" width="640" height="284" rx="8" fill="none" stroke="#e53935" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="96" y="394" font-size="11" font-weight="600" fill="#b71c1c">Security Group — dev-default-sg</text>
  <!-- Terraform label -->
  <rect x="400" y="382" width="306" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.7"/>
  <text x="553" y="393" text-anchor="middle" font-size="9" fill="#5c2d91">aws_default_security_group.default-sg</text>

  <!-- Rule pills -->
  <rect x="96" y="400" width="192" height="22" rx="4" fill="#ffebee" stroke="#ef9a9a" stroke-width="0.8"/>
  <text x="192" y="411" text-anchor="middle" font-size="10" fill="#b71c1c">IN TCP :22 — your IP (SSH)</text>
  <rect x="300" y="400" width="208" height="22" rx="4" fill="#ffebee" stroke="#ef9a9a" stroke-width="0.8"/>
  <text x="404" y="411" text-anchor="middle" font-size="10" fill="#b71c1c">IN TCP :8080 — 0.0.0.0/0 (HTTP)</text>
  <rect x="520" y="400" width="184" height="22" rx="4" fill="#f3f3f3" stroke="#ccc" stroke-width="0.8"/>
  <text x="612" y="411" text-anchor="middle" font-size="10" fill="#555">OUT all — 0.0.0.0/0</text>

  <!-- ══ SSH Key Pair ══ -->
  <rect x="96" y="432" width="152" height="62" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <circle cx="122" cy="452" r="9" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="122" cy="452" r="3" fill="#555"/>
  <line x1="131" y1="452" x2="150" y2="452" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="147" y1="452" x2="147" y2="458" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="142" y1="452" x2="142" y2="458" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <text x="172" y="448" font-size="11" font-weight="600" fill="#212121">SSH key pair</text>
  <text x="172" y="462" font-size="10" fill="#757575">server-key (RSA)</text>
  <text x="172" y="476" font-size="10" fill="#757575">id_rsa.pub</text>
  <!-- Terraform label -->
  <rect x="96" y="494" width="152" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.7"/>
  <text x="172" y="505" text-anchor="middle" font-size="9" fill="#5c2d91">aws_key_pair.ssh-key</text>

  <!-- ══ AMI ══ -->
  <rect x="96" y="520" width="152" height="62" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <ellipse cx="122" cy="538" rx="13" ry="5" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="109" y1="538" x2="109" y2="550" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="135" y1="538" x2="135" y2="550" stroke="#2e7d32" stroke-width="1.5"/>
  <ellipse cx="122" cy="550" rx="13" ry="5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="152" y="537" font-size="11" font-weight="600" fill="#1b5e20">Amazon Linux 2</text>
  <text x="152" y="551" font-size="10" fill="#388e3c">AMI — dynamic</text>
  <text x="152" y="565" font-size="10" fill="#388e3c">amzn2-hvm-x86_64</text>
  <!-- Terraform label -->
  <rect x="96" y="582" width="152" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.7"/>
  <text x="172" y="593" text-anchor="middle" font-size="9" fill="#5c2d91">data.aws_ami.latest</text>

  <!-- dashed connectors: key + AMI → EC2 -->
  <line x1="248" y1="463" x2="282" y2="480" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-gray)"/>
  <line x1="248" y1="551" x2="282" y2="540" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-gray)"/>

  <!-- ══ EC2 Instance ══ -->
  <rect x="282" y="432" width="422" height="218" rx="10" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <rect x="300" y="448" width="36" height="9" rx="2" fill="#7e57c2"/>
  <rect x="300" y="460" width="36" height="9" rx="2" fill="#7e57c2" opacity="0.7"/>
  <rect x="300" y="472" width="36" height="9" rx="2" fill="#7e57c2" opacity="0.4"/>
  <circle cx="332" cy="452" r="2.5" fill="#4caf50"/>
  <circle cx="332" cy="464" r="2.5" fill="#4caf50"/>
  <circle cx="332" cy="476" r="2.5" fill="#9e9e9e"/>
  <text x="490" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#311b92">EC2 instance — dev-server</text>
  <text x="490" y="474" text-anchor="middle" font-size="11" fill="#5e35b1">t2.micro · Amazon Linux 2 · public IP</text>
  <!-- Terraform label on EC2 -->
  <rect x="316" y="480" width="352" height="16" rx="3" fill="#f3e8ff" stroke="#7B42BC" stroke-width="0.8"/>
  <text x="492" y="491" text-anchor="middle" font-size="9" fill="#5c2d91">aws_instance.myapp_server  ·  provisioner: file + remote-exec + local-exec</text>

  <!-- Docker box -->
  <rect x="298" y="504" width="390" height="134" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <rect x="314" y="518" width="30" height="20" rx="3" fill="#2196f3"/>
  <rect x="319" y="512" width="9" height="7" rx="2" fill="#2196f3" opacity="0.75"/>
  <rect x="332" y="514" width="8" height="5" rx="2" fill="#2196f3" opacity="0.75"/>
  <path d="M314 539 Q319 543 324 539 Q329 535 334 539 Q339 543 344 539" fill="none" stroke="#90caf9" stroke-width="1.2" stroke-linecap="round"/>
  <text x="490" y="524" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">Docker</text>
  <text x="490" y="540" text-anchor="middle" font-size="10" fill="#1565c0">entry-script.sh: yum install docker → systemctl start</text>

  <!-- Nginx pill -->
  <rect x="314" y="552" width="358" height="76" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="350" y="596" text-anchor="middle" font-size="36" font-weight="700" fill="#1b5e20" font-family="Arial Black, Arial, sans-serif">N</text>
  <text x="510" y="576" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">Nginx</text>
  <text x="510" y="594" text-anchor="middle" font-size="11" fill="#388e3c">host :8080 → container :80</text>
  <text x="510" y="610" text-anchor="middle" font-size="10" fill="#555">docker run -p 8080:80 nginx</text>

  <!-- ══ Terraform footer ══ -->
  <rect x="0" y="694" width="800" height="26" rx="8" fill="#7B42BC"/>
  <rect x="0" y="694" width="800" height="8" fill="#7B42BC"/>
  <!-- T logo repeated -->
  <rect x="16" y="702" width="14" height="2.5" rx="1" fill="white"/>
  <rect x="21" y="702" width="2.5" height="14" rx="1" fill="white"/>
  <text x="44" y="712" font-size="10" fill="#e0c8ff">Provisioned by Terraform · main.tf · terraform apply</text>
  <text x="680" y="712" font-size="10" fill="#e0c8ff">ca-central-1</text>

</svg>

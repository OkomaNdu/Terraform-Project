<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- ── Background ── -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#FF9900" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="700" fill="#f4f6f9"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#1a1f36"/>
  <!-- Terraform T logo in title -->
  <polygon points="18,12 28,8 38,12 28,16" fill="#7B42BC"/>
  <polygon points="18,20 28,16 38,20 28,24" fill="#9B62DC" opacity="0.85"/>
  <polygon points="18,28 28,24 38,28 28,32" fill="#7B42BC" opacity="0.7"/>
  <text x="48" y="30" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">Terraform · AWS Nginx Docker Deployment</text>
  <text x="1180" y="30" text-anchor="end" font-size="11" fill="#8892a4">ca-central-1 · Modular IaC</text>

  <!-- ════════════════════════════════════════════════
       LEFT PANEL — Dev Environment
  ════════════════════════════════════════════════ -->

  <!-- Panel card -->
  <rect x="18" y="66" width="258" height="614" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="18" y="66" width="258" height="36" rx="10" fill="#2d3561"/>
  <rect x="18" y="90" width="258" height="12" fill="#2d3561"/>
  <text x="147" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="0.8">DEV ENVIRONMENT</text>

  <!-- ── Terraform config files ── -->
  <!-- Terraform logo stacked diamonds -->
  <polygon points="110,138 147,118 184,138 147,158" fill="#7B42BC"/>
  <polygon points="79,164 116,144 153,164 116,184" fill="#7B42BC" opacity="0.85"/>
  <polygon points="141,164 178,144 215,164 178,184" fill="#5c2d91"/>
  <polygon points="79,190 116,170 153,190 116,210" fill="#7B42BC" opacity="0.65"/>
  <polygon points="141,190 178,170 215,190 178,210" fill="#5c2d91" opacity="0.8"/>

  <rect x="90" y="218" width="114" height="26" rx="5" fill="#f0e8ff"/>
  <text x="147" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#5c2d91">Terraform</text>
  <text x="147" y="240" text-anchor="middle" font-size="9" fill="#7B42BC">config files (*.tf)</text>

  <!-- divider -->
  <line x1="38" y1="258" x2="256" y2="258" stroke="#e8eaf0" stroke-width="1"/>

  <!-- ── entry-script.sh ── -->
  <!-- file icon -->
  <rect x="72" y="272" width="52" height="64" rx="5" fill="#f8f9fc" stroke="#c5cae9" stroke-width="1.2"/>
  <polygon points="106,272 124,290 106,290" fill="#c5cae9"/>
  <rect x="106" y="272" width="18" height="18" rx="0" fill="#f8f9fc" stroke="#c5cae9" stroke-width="1.2"/>
  <line x1="82" y1="300" x2="114" y2="300" stroke="#9fa8da" stroke-width="1.2"/>
  <line x1="82" y1="310" x2="114" y2="310" stroke="#9fa8da" stroke-width="1.2"/>
  <line x1="82" y1="320" x2="104" y2="320" stroke="#9fa8da" stroke-width="1.2"/>
  <text x="98" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#3949ab">entry-script.sh</text>
  <text x="98" y="362" text-anchor="middle" font-size="9" fill="#7986cb">bootstrap · user_data</text>

  <!-- Arrow down from files to Terraform core -->
  <line x1="147" y1="245" x2="147" y2="268" stroke="#9fa8da" stroke-width="1.2" stroke-dasharray="4 2"/>
  <line x1="124" y1="338" x2="158" y2="360" stroke="#9fa8da" stroke-width="1.2" stroke-dasharray="4 2"/>

  <!-- ── Terraform core ── -->
  <rect x="96" y="374" width="102" height="102" rx="10" fill="#f0e8ff" stroke="#7B42BC" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="122,406 147,392 172,406 147,420" fill="#7B42BC"/>
  <polygon points="122,422 147,408 172,422 147,436" fill="#5c2d91" opacity="0.9"/>
  <text x="147" y="456" text-anchor="middle" font-size="10" font-weight="700" fill="#4a148c">Terraform</text>
  <text x="147" y="468" text-anchor="middle" font-size="9" fill="#7B42BC">core</text>

  <!-- Arrow right from Terraform core to AWS panel -->
  <line x1="200" y1="425" x2="280" y2="425" stroke="#7B42BC" stroke-width="1.8" stroke-dasharray="5 2" marker-end="url(#arr)"/>

  <!-- Arrow down to tfstate -->
  <line x1="147" y1="476" x2="147" y2="520" stroke="#9fa8da" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- ── tfstate file ── -->
  <rect x="100" y="522" width="94" height="110" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2" filter="url(#shadow)"/>
  <!-- file page lines -->
  <line x1="116" y1="548" x2="178" y2="548" stroke="#42a5f5" stroke-width="1.2"/>
  <line x1="116" y1="560" x2="178" y2="560" stroke="#42a5f5" stroke-width="1.2"/>
  <line x1="116" y1="572" x2="178" y2="572" stroke="#42a5f5" stroke-width="1.2"/>
  <line x1="116" y1="584" x2="160" y2="584" stroke="#42a5f5" stroke-width="1.2"/>
  <!-- cyan accent top bar -->
  <rect x="100" y="522" width="94" height="18" rx="8" fill="#0097d6"/>
  <rect x="100" y="530" width="94" height="10" fill="#0097d6"/>
  <text x="147" y="534" text-anchor="middle" font-size="8" font-weight="700" fill="white">TF STATE</text>
  <text x="147" y="604" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">terraform.tfstate</text>
  <text x="147" y="618" text-anchor="middle" font-size="9" fill="#1976d2">remote / local</text>

  <!-- ════════════════════════════════════════════════
       RIGHT PANEL — AWS Cloud
  ════════════════════════════════════════════════ -->

  <!-- AWS Cloud card -->
  <rect x="290" y="66" width="892" height="614" rx="10" fill="#ffffff" filter="url(#shadow)"/>

  <!-- AWS header bar -->
  <rect x="290" y="66" width="892" height="36" rx="10" fill="#232F3E"/>
  <rect x="290" y="90" width="892" height="12" fill="#232F3E"/>
  <rect x="300" y="74" width="46" height="20" rx="4" fill="#FF9900"/>
  <text x="323" y="88" text-anchor="middle" font-size="10" font-weight="800" fill="#232F3E" font-family="monospace">aws</text>
  <text x="358" y="88" font-size="12" font-weight="700" fill="#FF9900">AWS Cloud</text>
  <text x="1172" y="88" text-anchor="end" font-size="10" fill="#8e9db5">terraform apply --auto-approve</text>

  <!-- ── Region boundary ── -->
  <rect x="302" y="110" width="868" height="558" rx="8" fill="#fdf8ff" stroke="#CC0066" stroke-width="1.5" stroke-dasharray="7 3"/>
  <rect x="302" y="110" width="140" height="22" rx="4" fill="#CC0066"/>
  <text x="372" y="125" text-anchor="middle" font-size="10" font-weight="700" fill="white">Region: ca-central-1</text>

  <!-- ── VPC boundary ── -->
  <rect x="314" y="142" width="844" height="516" rx="8" fill="#faf5ff" stroke="#8A2BE2" stroke-width="1.5"/>
  <rect x="314" y="142" width="108" height="20" rx="4" fill="#8A2BE2"/>
  <text x="368" y="156" text-anchor="middle" font-size="10" font-weight="700" fill="white">VPC: 10.0.0.0/16</text>
  <text x="430" y="156" font-size="9" fill="#8A2BE2">dev-vpc  ·  aws_vpc.myapp-vpc</text>

  <!-- ── Availability Zone ── -->
  <rect x="326" y="172" width="620" height="474" rx="8" fill="#f5f5ff" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="5 3"/>
  <rect x="326" y="172" width="160" height="20" rx="4" fill="#5c6bc0"/>
  <text x="406" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="white">AZ: ca-central-1a</text>

  <!-- ── Public Subnet ── -->
  <rect x="338" y="202" width="596" height="432" rx="8" fill="#f1f8f1" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- subnet header -->
  <rect x="338" y="202" width="596" height="28" rx="8" fill="#2e7d32"/>
  <rect x="338" y="216" width="596" height="14" fill="#2e7d32"/>
  <!-- padlock -->
  <rect x="350" y="209" width="11" height="9" rx="2" fill="none" stroke="white" stroke-width="1.2"/>
  <path d="M353 209 Q353 205 355.5 205 Q358 205 358 209" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="370" y="220" font-size="10" font-weight="700" fill="white">Public Subnet: 10.0.10.0/24</text>
  <text x="500" y="220" font-size="9" fill="#a5d6a7">aws_subnet.myapp-subnet-1  ·  module.myapp-subnet</text>

  <!-- ── Security Group ── -->
  <rect x="350" y="240" width="572" height="382" rx="8" fill="none" stroke="#e53935" stroke-width="1.2" stroke-dasharray="5 3"/>
  <!-- SG label -->
  <rect x="350" y="236" width="220" height="18" rx="4" fill="#e53935"/>
  <text x="460" y="248" text-anchor="middle" font-size="9" font-weight="700" fill="white">Security Group: dev-default-sg  ·  aws_default_security_group</text>

  <!-- Firewall rule pills -->
  <rect x="362" y="262" width="148" height="20" rx="10" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="436" y="276" text-anchor="middle" font-size="8.5" fill="#c62828">IN  :22  TCP  your-ip/32</text>
  <rect x="518" y="262" width="148" height="20" rx="10" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="592" y="276" text-anchor="middle" font-size="8.5" fill="#c62828">IN  :8080  TCP  0.0.0.0/0</text>
  <rect x="674" y="262" width="120" height="20" rx="10" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
  <text x="734" y="276" text-anchor="middle" font-size="8.5" fill="#555">OUT  all  0.0.0.0/0</text>

  <!-- ── EC2 Instance card ── -->
  <rect x="366" y="294" width="290" height="316" rx="10" fill="#fff8f0" stroke="#e65100" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="366" y="294" width="290" height="32" rx="10" fill="#e65100"/>
  <rect x="366" y="310" width="290" height="16" fill="#e65100"/>
  <!-- EC2 chip icon in header -->
  <rect x="376" y="300" width="22" height="18" rx="3" fill="#bf360c"/>
  <rect x="379" y="303" width="16" height="12" rx="2" fill="#ff8a65"/>
  <line x1="382" y1="300" x2="382" y2="297" stroke="#e65100" stroke-width="1.5"/>
  <line x1="387" y1="300" x2="387" y2="297" stroke="#e65100" stroke-width="1.5"/>
  <line x1="392" y1="300" x2="392" y2="297" stroke="#e65100" stroke-width="1.5"/>
  <line x1="382" y1="318" x2="382" y2="321" stroke="#e65100" stroke-width="1.5"/>
  <line x1="387" y1="318" x2="387" y2="321" stroke="#e65100" stroke-width="1.5"/>
  <line x1="392" y1="318" x2="392" y2="321" stroke="#e65100" stroke-width="1.5"/>
  <text x="408" y="315" font-size="11" font-weight="700" fill="white">EC2 Instance — dev-server</text>
  <text x="376" y="338" font-size="9" fill="#bf360c">t2.micro  ·  Amazon Linux 2  ·  public IP assigned</text>
  <text x="376" y="350" font-size="9" fill="#bf360c">aws_instance.myapp-server  ·  module.myapp-server</text>

  <!-- AMI info row -->
  <rect x="376" y="358" width="270" height="22" rx="4" fill="#fbe9e7" stroke="#ffab91" stroke-width="0.8"/>
  <text x="511" y="373" text-anchor="middle" font-size="8.5" fill="#bf360c">AMI: amzn2-ami-hvm-*-x86_64-gp2  (dynamic · data.aws_ami)</text>

  <!-- Key pair row -->
  <rect x="376" y="386" width="270" height="22" rx="4" fill="#fce4ec" stroke="#f48fb1" stroke-width="0.8"/>
  <!-- key icon -->
  <circle cx="390" cy="397" r="5" fill="none" stroke="#c2185b" stroke-width="1.2"/>
  <circle cx="390" cy="397" r="2" fill="#c2185b"/>
  <line x1="395" y1="397" x2="406" y2="397" stroke="#c2185b" stroke-width="1.2"/>
  <line x1="404" y1="397" x2="404" y2="401" stroke="#c2185b" stroke-width="1"/>
  <line x1="400" y1="397" x2="400" y2="401" stroke="#c2185b" stroke-width="1"/>
  <text x="415" y="401" font-size="8.5" fill="#880e4f">SSH Key Pair: server-key  ·  aws_key_pair.ssh-key</text>

  <!-- Docker container box -->
  <rect x="376" y="416" width="270" height="130" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <rect x="376" y="416" width="270" height="24" rx="8" fill="#1565c0"/>
  <rect x="376" y="428" width="270" height="12" fill="#1565c0"/>
  <!-- Docker whale -->
  <rect x="384" y="421" width="18" height="13" rx="2" fill="white"/>
  <rect x="387" y="417" width="6" height="5" rx="1" fill="white" opacity="0.8"/>
  <rect x="395" y="419" width="5" height="3" rx="1" fill="white" opacity="0.7"/>
  <path d="M384 435 Q387 438 390 435 Q393 432 396 435" fill="none" stroke="#90caf9" stroke-width="1" stroke-linecap="round"/>
  <text x="410" y="432" font-size="10" font-weight="700" fill="white">Docker Container</text>

  <!-- Nginx inside Docker -->
  <rect x="386" y="448" width="250" height="90" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <!-- Nginx N lettermark -->
  <rect x="394" y="456" width="40" height="40" rx="6" fill="#1b5e20"/>
  <text x="414" y="483" text-anchor="middle" font-size="26" font-weight="900" fill="white" font-family="Arial Black, Arial">N</text>
  <text x="448" y="468" font-size="12" font-weight="700" fill="#1b5e20">Nginx</text>
  <text x="448" y="482" font-size="9" fill="#388e3c">docker run -d -p 8080:80 nginx</text>
  <text x="448" y="495" font-size="9" fill="#388e3c">host :8080  →  container :80</text>
  <rect x="448" y="500" width="180" height="16" rx="8" fill="#c8e6c9" stroke="#66bb6a" stroke-width="0.8"/>
  <text x="538" y="511" text-anchor="middle" font-size="8" fill="#1b5e20">entry-script.sh · user_data · cloud-init</text>

  <!-- ── Internet Gateway ── -->
  <!-- connector line from EC2 to IGW -->
  <line x1="658" y1="452" x2="730" y2="452" stroke="#555" stroke-width="1.5" stroke-dasharray="0" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <rect x="730" y="414" width="100" height="100" rx="50" fill="none" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="740" y="424" width="80" height="80" rx="40" fill="#ede7f6" stroke="#7986cb" stroke-width="1"/>
  <!-- crosshair -->
  <line x1="780" y1="434" x2="780" y2="494" stroke="#5c6bc0" stroke-width="1.5"/>
  <line x1="750" y1="464" x2="810" y2="464" stroke="#5c6bc0" stroke-width="1.5"/>
  <!-- arrows on crosshair -->
  <polygon points="780,436 775,446 785,446" fill="#5c6bc0"/>
  <polygon points="780,492 775,482 785,482" fill="#5c6bc0"/>
  <polygon points="752,464 762,459 762,469" fill="#5c6bc0"/>
  <polygon points="808,464 798,459 798,469" fill="#5c6bc0"/>
  <text x="780" y="530" text-anchor="middle" font-size="10" font-weight="700" fill="#3949ab">Internet</text>
  <text x="780" y="543" text-anchor="middle" font-size="10" font-weight="700" fill="#3949ab">Gateway</text>
  <text x="780" y="556" text-anchor="middle" font-size="8.5" fill="#7986cb">dev-igw</text>
  <text x="780" y="568" text-anchor="middle" font-size="8" fill="#9fa8da">aws_internet_gateway</text>

  <!-- ── Route Table ── -->
  <line x1="832" y1="452" x2="880" y2="452" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <rect x="880" y="414" width="100" height="100" rx="50" fill="none" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="890" y="424" width="80" height="80" rx="40" fill="#ede7f6" stroke="#7986cb" stroke-width="1"/>
  <!-- route table icon: up arrow -->
  <line x1="930" y1="490" x2="930" y2="442" stroke="#5c6bc0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="916" y1="456" x2="930" y2="442" stroke="#5c6bc0" stroke-width="2"/>
  <line x1="944" y1="456" x2="930" y2="442" stroke="#5c6bc0" stroke-width="2"/>
  <text x="930" y="530" text-anchor="middle" font-size="10" font-weight="700" fill="#3949ab">Route</text>
  <text x="930" y="543" text-anchor="middle" font-size="10" font-weight="700" fill="#3949ab">Table</text>
  <text x="930" y="556" text-anchor="middle" font-size="8.5" fill="#7986cb">0.0.0.0/0 → IGW</text>
  <text x="930" y="568" text-anchor="middle" font-size="8" fill="#9fa8da">aws_default_route_table</text>

  <!-- ── Users ── -->
  <line x1="982" y1="452" x2="1030" y2="452" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- users group icon -->
  <circle cx="1090" cy="432" r="16" fill="#eceff1" stroke="#607d8b" stroke-width="1.5"/>
  <circle cx="1083" cy="428" r="7" fill="none" stroke="#546e7a" stroke-width="1.5"/>
  <path d="M1072 444 Q1072 436 1083 436 Q1094 436 1094 444" fill="none" stroke="#546e7a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="1099" cy="426" r="5.5" fill="none" stroke="#90a4ae" stroke-width="1.2"/>
  <path d="M1091 438 Q1093 433 1099 433 Q1108 433 1108 440" fill="none" stroke="#90a4ae" stroke-width="1.2" stroke-linecap="round"/>
  <text x="1090" y="472" text-anchor="middle" font-size="11" font-weight="700" fill="#37474f">Users</text>
  <text x="1090" y="485" text-anchor="middle" font-size="8.5" fill="#607d8b">HTTP :8080</text>

  <!-- ── Terraform footer tag ── -->
  <rect x="302" y="642" width="868" height="22" rx="6" fill="#1a1f36"/>
  <text x="736" y="657" text-anchor="middle" font-size="9" fill="#8892a4">
    Provisioned by Terraform · modules/subnet · modules/webserver · terraform init → plan → apply
  </text>

</svg>
